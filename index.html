<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXEL CREATURES — Media Art</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-cyan:    #00ffff;
      --neon-pink:    #ff00cc;
      --neon-yellow:  #ffee00;
      --neon-green:   #00ff88;
      --neon-orange:  #ff6600;
      --deep-bg:      #000208;
    }

    body {
      overflow: hidden;
      background: var(--deep-bg);
      font-family: 'Share Tech Mono', monospace;
      user-select: none;
    }

    /* ── Canvas ── */
    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Scanlines overlay ── */
    #scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      animation: scanShift 8s linear infinite;
    }
    @keyframes scanShift {
      from { background-position: 0 0; }
      to   { background-position: 0 400px; }
    }

    /* ── Vignette ── */
    #vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 40%,
        rgba(0,0,0,0.7) 100%
      );
    }

    /* ── HUD frame corners ── */
    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      z-index: 10;
      pointer-events: none;
    }
    .corner::before,
    .corner::after {
      content: '';
      position: absolute;
      background: var(--neon-cyan);
      box-shadow: 0 0 8px var(--neon-cyan);
    }
    .corner-tl { top: 16px; left: 16px; }
    .corner-tl::before { width: 2px; height: 40px; top: 0; left: 0; }
    .corner-tl::after  { width: 40px; height: 2px; top: 0; left: 0; }

    .corner-tr { top: 16px; right: 16px; }
    .corner-tr::before { width: 2px; height: 40px; top: 0; right: 0; }
    .corner-tr::after  { width: 40px; height: 2px; top: 0; right: 0; }

    .corner-bl { bottom: 16px; left: 16px; }
    .corner-bl::before { width: 2px; height: 40px; bottom: 0; left: 0; }
    .corner-bl::after  { width: 40px; height: 2px; bottom: 0; left: 0; }

    .corner-br { bottom: 16px; right: 16px; }
    .corner-br::before { width: 2px; height: 40px; bottom: 0; right: 0; }
    .corner-br::after  { width: 40px; height: 2px; bottom: 0; right: 0; }

    /* ── Top HUD ── */
    #hud-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      pointer-events: none;
    }

    #title-block {
      display: flex;
      flex-direction: column;
    }
    #title-main {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      color: var(--neon-cyan);
      letter-spacing: 0.2em;
      text-shadow:
        0 0 6px  var(--neon-cyan),
        0 0 20px var(--neon-cyan),
        0 0 50px rgba(0,255,255,0.4);
      animation: titlePulse 3s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.75; }
    }
    #title-sub {
      font-size: 0.65rem;
      color: rgba(0,255,255,0.45);
      letter-spacing: 0.3em;
      margin-top: 2px;
    }

    #sys-info {
      text-align: right;
      font-size: 0.6rem;
      color: rgba(0,255,255,0.4);
      line-height: 1.8;
    }
    #sys-info span { color: rgba(0,255,255,0.7); }

    /* ── Character badge ── */
    #char-badge {
      position: fixed;
      top: 50%;
      right: 28px;
      transform: translateY(-50%);
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .badge-item {
      width: 52px;
      height: 52px;
      border: 1px solid rgba(0,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      position: relative;
      transition: all 0.3s ease;
    }
    .badge-item.active {
      border-color: var(--neon-cyan);
      box-shadow:
        0 0 8px var(--neon-cyan),
        inset 0 0 12px rgba(0,255,255,0.1);
    }
    .badge-item .badge-label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.45rem;
      letter-spacing: 0.15em;
      color: rgba(0,255,255,0.5);
      white-space: nowrap;
    }

    /* ── Bottom HUD ── */
    #hud-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 18px 28px;
      pointer-events: none;
    }

    #creature-display {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #creature-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3);
    }
    #creature-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--neon-pink);
      text-shadow:
        0 0 8px  var(--neon-pink),
        0 0 25px var(--neon-pink);
      letter-spacing: 0.1em;
      transition: all 0.4s ease;
      min-height: 1.2em;
    }

    #score-block {
      text-align: right;
    }
    #score-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3);
    }
    #score-value {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--neon-yellow);
      text-shadow:
        0 0 8px  var(--neon-yellow),
        0 0 25px var(--neon-yellow);
      letter-spacing: 0.1em;
    }

    /* ── Centre glitch line ── */
    #glitch-line {
      position: fixed;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      opacity: 0;
      z-index: 3;
      pointer-events: none;
      animation: glitchLine 6s ease-in-out infinite;
    }
    @keyframes glitchLine {
      0%,90%,100% { opacity: 0; transform: translateY(0); }
      93%  { opacity: 0.6; transform: translateY(-2px); }
      96%  { opacity: 0.3; transform: translateY(4px); }
    }

    /* ── Splash overlay ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #splash-emoji {
      font-size: clamp(3rem, 8vw, 5rem);
      animation: floatEmoji 2.5s ease-in-out infinite;
    }
    @keyframes floatEmoji {
      0%,100% { transform: translateY(0)   rotate(-3deg); }
      50%     { transform: translateY(-14px) rotate(3deg); }
    }
    #splash-text {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.8rem, 2vw, 1rem);
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 0 20px;
    }
    #splash-hint {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: rgba(0,255,255,0.35);
      animation: blink 1.4s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Combo flash ── */
    #combo-flash {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at center, rgba(255,0,204,0.15), transparent 70%);
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <!-- Atmosphere layers -->
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="glitch-line"></div>
  <div id="combo-flash"></div>

  <!-- HUD corners -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Top HUD -->
  <div id="hud-top">
    <div id="title-block">
      <div id="title-main">PIXEL CREATURES</div>
      <div id="title-sub">INTERACTIVE MEDIA ART / v2.0</div>
    </div>
    <div id="sys-info">
      SYS: <span>ONLINE</span><br>
      MODE: <span>FREESTYLE</span><br>
      ENGINE: <span>THREE.JS</span>
    </div>
  </div>

  <!-- Right character badges -->
  <div id="char-badge">
    <div class="badge-item" id="badge-pizza">🍕<span class="badge-label">PIZZA</span></div>
    <div class="badge-item" id="badge-dinosaur">🦕<span class="badge-label">DINO</span></div>
    <div class="badge-item" id="badge-idea">💡<span class="badge-label">IDEA</span></div>
  </div>

  <!-- Bottom HUD -->
  <div id="hud-bottom">
    <div id="creature-display">
      <div id="creature-label">LAST SPAWN</div>
      <div id="creature-name">—</div>
    </div>
    <div id="score-block">
      <div id="score-label">EXPLOSIONS</div>
      <div id="score-value">000</div>
    </div>
  </div>

  <!-- Splash screen -->
  <div id="splash">
    <div id="splash-emoji">🍕</div>
    <div id="splash-text">TOUCH THE VOID TO SPAWN A CREATURE</div>
    <div id="splash-hint">[ CLICK / TAP ANYWHERE ]</div>
  </div>

  <!-- Canvas -->
  <div id="canvas-container"></div>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    /* ─────────────────────────────────────────────
       DOM refs
    ───────────────────────────────────────────── */
    const container     = document.getElementById('canvas-container');
    const splash        = document.getElementById('splash');
    const splashEmoji   = document.getElementById('splash-emoji');
    const creatureName  = document.getElementById('creature-name');
    const scoreValue    = document.getElementById('score-value');
    const comboFlash    = document.getElementById('combo-flash');
    const badges        = {
      pizza:    document.getElementById('badge-pizza'),
      dinosaur: document.getElementById('badge-dinosaur'),
      idea:     document.getElementById('badge-idea'),
    };

    let explosionCount = 0;
    let splashHidden   = false;

    function updateScore() {
      explosionCount++;
      scoreValue.textContent = String(explosionCount).padStart(3, '0');
      gsap.fromTo(comboFlash, { opacity: 0.8 }, { opacity: 0, duration: 0.6, ease: 'expo.out' });
    }

    const SHAPE_META = {
      pizza:    { emoji: '🍕', label: 'PIZZA',    color: 0xff6600 },
      dinosaur: { emoji: '🦕', label: 'DINOSAUR', color: 0x00ff88 },
      idea:     { emoji: '💡', label: 'IDEA',     color: 0xffee00 },
    };

    function setActiveChar(type) {
      Object.keys(badges).forEach(k => badges[k].classList.toggle('active', k === type));
      const meta = SHAPE_META[type];
      creatureName.textContent = meta.label;
      creatureName.style.color = '#' + meta.color.toString(16).padStart(6,'0');
      creatureName.style.textShadow = `0 0 8px #${meta.color.toString(16).padStart(6,'0')}, 0 0 25px #${meta.color.toString(16).padStart(6,'0')}`;
      splashEmoji.textContent = meta.emoji;
    }

    /* ─────────────────────────────────────────────
       Scene / Camera / Renderer
    ───────────────────────────────────────────── */
    const scene  = new THREE.Scene();
    scene.fog    = new THREE.FogExp2(0x000208, 0.018);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 22);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    container.appendChild(renderer.domElement);

    /* ── Bloom ── */
    const renderPass = new RenderPass(scene, camera);
    const bloomPass  = new UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight),
      2.4, 0.6, 0.05
    );
    const composer = new EffectComposer(renderer);
    composer.addPass(renderPass);
    composer.addPass(bloomPass);

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });

    /* ─────────────────────────────────────────────
       Audio
    ───────────────────────────────────────────── */
    let audioCtx, masterGain, filter, isAudioReady = false;

    function initAudio() {
      if (isAudioReady) return;
      isAudioReady = true;
      audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.4;
      masterGain.connect(audioCtx.destination);

      filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 200;
      filter.Q.value = 6;
      filter.connect(masterGain);

      const osc1 = audioCtx.createOscillator();
      osc1.type = 'sawtooth';
      osc1.frequency.value = 55;
      osc1.connect(filter);
      osc1.start();

      const osc2 = audioCtx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = 27.5;
      osc2.connect(filter);
      osc2.start();
    }

    function playImpact(freq = 120) {
      if (!masterGain) return;
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type  = 'square';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(8, audioCtx.currentTime + 0.35);
      gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.35);
    }

    /* ─────────────────────────────────────────────
       Background: Star field
    ───────────────────────────────────────────── */
    (function buildStars() {
      const N   = 600;
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(N * 3);
      for (let i = 0; i < N; i++) {
        pos[i*3]   = (Math.random()-0.5)*120;
        pos[i*3+1] = (Math.random()-0.5)*60;
        pos[i*3+2] = (Math.random()-0.5)*60 - 20;
      }
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const mat = new THREE.PointsMaterial({
        color: 0xaaaaff, size: 0.08,
        transparent: true, opacity: 0.5,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      scene.add(new THREE.Points(geo, mat));
    })();

    /* ── Floating energy rings ── */
    const rings = [];
    for (let i = 0; i < 3; i++) {
      const geo = new THREE.TorusGeometry(4 + i*2.5, 0.03, 8, 80);
      const mat = new THREE.MeshBasicMaterial({
        color: [0x00ffff, 0xff00cc, 0xffee00][i],
        transparent: true, opacity: 0.2,
      });
      const ring = new THREE.Mesh(geo, mat);
      ring.rotation.x = Math.PI / 2;
      ring.position.y = -4;
      scene.add(ring);
      rings.push(ring);
    }

    /* ── Grid floor ── */
    const gridHelper = new THREE.GridHelper(60, 60, 0x002244, 0x001122);
    gridHelper.position.y = -5;
    scene.add(gridHelper);

    /* ─────────────────────────────────────────────
       Sweeper Pillar
    ───────────────────────────────────────────── */
    const pillarGeo = new THREE.CylinderGeometry(0.35, 0.35, 35, 16);
    pillarGeo.translate(0, 17.5, 0);
    const pillarMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const pillar    = new THREE.Mesh(pillarGeo, pillarMat);
    pillar.position.x = 2.5;
    pillar.rotation.z = -0.15;

    const pillarPivot = new THREE.Group();
    pillarPivot.add(pillar);
    scene.add(pillarPivot);

    /* Tiny sphere at sweep origin for glow */
    const knobGeo = new THREE.SphereGeometry(0.5, 16, 16);
    const knobMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const knob    = new THREE.Mesh(knobGeo, knobMat);
    pillarPivot.add(knob);

    /* ─────────────────────────────────────────────
       Particle Characters
    ───────────────────────────────────────────── */
    const PARTICLE_COUNT = 380;

    function getShapePoints(type) {
      const pts = [];
      const s   = 1.8;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        let x = 0, y = 0, z = 0;

        switch (type) {
          /* ── 🍕 Pizza: detailed round slice with toppings ── */
          case 'pizza': {
            const section = Math.random();
            if (section < 0.55) {
              // Main triangular slice body (uniform fill)
              let a = Math.random(), b = Math.random();
              if (a + b > 1) { a = 1 - a; b = 1 - b; }
              const tipX = 0, tipY = -2 * s;
              const leftX = -2 * s, leftY = 2 * s;
              const rightX = 2 * s, rightY = 2 * s;
              x = tipX + a*(leftX-tipX) + b*(rightX-tipX);
              y = tipY + a*(leftY-tipY) + b*(rightY-tipY);
            } else if (section < 0.7) {
              // Crust arc (top semicircle)
              const ang = Math.random() * Math.PI;
              const r   = 1.95 * s + (Math.random()-0.5) * 0.25;
              x = Math.cos(ang) * r;
              y = Math.sin(ang) * r * 0.5 + 1.7 * s;
            } else if (section < 0.82) {
              // Pepperoni cluster 1
              const th = Math.random() * Math.PI * 2;
              const r  = Math.random() * 0.55 * s;
              x = Math.cos(th) * r - 0.5 * s;
              y = Math.sin(th) * r + 0.3 * s;
            } else if (section < 0.93) {
              // Pepperoni cluster 2
              const th = Math.random() * Math.PI * 2;
              const r  = Math.random() * 0.5 * s;
              x = Math.cos(th) * r + 0.8 * s;
              y = Math.sin(th) * r + 0.8 * s;
            } else {
              // Cheese dots scatter
              x = (Math.random()-0.5) * 3 * s;
              y = Math.random() * 3 * s - 1.5 * s;
            }
            z = (Math.random()-0.5) * 0.4;
            break;
          }

          /* ── 🦕 Dinosaur: brachiosaurus silhouette ── */
          case 'dinosaur': {
            const seg = Math.random();
            if (seg < 0.30) {
              // Long body
              x = (Math.random()-0.5) * 4 * s;
              y = (Math.random()-0.5) * 1.2 * s - 0.5 * s;
            } else if (seg < 0.52) {
              // Long neck (angled up-right)
              const t = Math.random();
              x = 1.2 * s + t * 1.5 * s;
              y = -0.5 * s + t * 3.5 * s;
              x += (Math.random()-0.5) * 0.4 * s;
            } else if (seg < 0.65) {
              // Head
              x = 2.5 * s + (Math.random()-0.5) * 0.9 * s;
              y = 3.0 * s + (Math.random()-0.5) * 0.7 * s;
            } else if (seg < 0.78) {
              // Tail (sweeps left-down)
              const t = Math.random();
              x = -2 * s - t * 2.5 * s;
              y = -0.5 * s - t * 0.8 * s;
              x += (Math.random()-0.5) * 0.3 * s;
            } else if (seg < 0.88) {
              // Front legs
              x = (0.5 + Math.random()*0.8) * s;
              y = -(1.0 + Math.random()*1.5) * s;
            } else {
              // Back legs
              x = -(0.5 + Math.random()*0.8) * s;
              y = -(1.0 + Math.random()*1.5) * s;
            }
            z = (Math.random()-0.5) * 0.4;
            break;
          }

          /* ── 💡 Idea: glowing light bulb with rays ── */
          case 'idea': {
            const p = Math.random();
            if (p < 0.45) {
              // Bulb globe (filled circle)
              const th  = Math.random() * Math.PI * 2;
              const rad = Math.sqrt(Math.random()) * 1.7 * s;
              x = Math.cos(th) * rad;
              y = Math.sin(th) * rad + 1.2 * s;
            } else if (p < 0.60) {
              // Base (screw segment)
              x = (Math.random()-0.5) * 1.1 * s;
              y = -(Math.random() * 1.6 + 0.1) * s;
            } else if (p < 0.72) {
              // Filament zigzag inside bulb
              const zigX = (Math.random()-0.5) * 0.8 * s;
              const zigY = (Math.random()-0.5) * 1.0 * s + 1.2 * s;
              x = zigX;
              y = zigY;
            } else {
              // Light rays radiating outward
              const ang = Math.random() * Math.PI * 2;
              const r   = 2.0 * s + Math.random() * 0.9 * s;
              x = Math.cos(ang) * r;
              y = Math.sin(ang) * r + 1.2 * s;
            }
            z = (Math.random()-0.5) * 0.4;
            break;
          }
        }
        pts.push(new THREE.Vector3(x, y, z));
      }
      return pts;
    }

    /* ─────────────────────────────────────────────
       Character manager
    ───────────────────────────────────────────── */
    const characters = [];

    function spawnCharacter(worldPos) {
      // Limit to 6 active characters
      if (characters.length >= 6) {
        const old = characters.shift();
        scene.remove(old.mesh);
      }

      const types  = ['pizza', 'dinosaur', 'idea'];
      const type   = types[Math.floor(Math.random() * types.length)];
      const meta   = SHAPE_META[type];
      const target = getShapePoints(type);

      const geo  = new THREE.BufferGeometry();
      const pos  = new Float32Array(PARTICLE_COUNT * 3);

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        pos[i*3]   = worldPos.x + (Math.random()-0.5) * 0.6;
        pos[i*3+1] = worldPos.y + (Math.random()-0.5) * 0.6;
        pos[i*3+2] = worldPos.z + (Math.random()-0.5) * 0.6;
      }
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

      const mat = new THREE.PointsMaterial({
        color: meta.color,
        size: 0.17,
        transparent: true,
        opacity: 1,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });

      const mesh = new THREE.Points(geo, mat);
      scene.add(mesh);

      const startPos = Array.from({ length: PARTICLE_COUNT }, (_,i) =>
        new THREE.Vector3(pos[i*3], pos[i*3+1], pos[i*3+2])
      );

      const char = {
        mesh, type, center: worldPos.clone(),
        assembled: false, exploded: false, dead: false,
        velocities: Array.from({ length: PARTICLE_COUNT }, () => new THREE.Vector3()),
      };

      const dummy = { t: 0 };
      gsap.to(dummy, {
        t: 1, duration: 1.6, ease: 'power3.out',
        onUpdate() {
          if (char.exploded) return;
          const attr = mesh.geometry.attributes.position;
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const sp = startPos[i];
            const tp = target[i];
            attr.array[i*3]   = sp.x + (worldPos.x + tp.x - sp.x) * dummy.t;
            attr.array[i*3+1] = sp.y + (worldPos.y + tp.y - sp.y) * dummy.t;
            attr.array[i*3+2] = sp.z + (worldPos.z + tp.z - sp.z) * dummy.t;
          }
          attr.needsUpdate = true;
        },
        onComplete() { char.assembled = true; },
      });

      characters.push(char);
      setActiveChar(type);

      // Hide splash on first spawn
      if (!splashHidden) {
        splashHidden = true;
        gsap.to(splash, { opacity: 0, duration: 1.0, onComplete: () => splash.style.display = 'none' });
      }
    }

    function explodeCharacter(char) {
      char.exploded = true;
      gsap.killTweensOf({});

      const pillarWP = new THREE.Vector3();
      pillar.getWorldPosition(pillarWP);

      playImpact(100 + Math.random() * 80);
      updateScore();

      const attr = char.mesh.geometry.attributes.position;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const px = attr.array[i*3];
        const py = attr.array[i*3+1];
        const pz = attr.array[i*3+2];
        const push = new THREE.Vector3(px,py,pz).sub(pillarWP).normalize().multiplyScalar(3.0);
        char.velocities[i].set(
          push.x + (Math.random()-0.5)*2,
          push.y + (Math.random()-0.5)*2,
          push.z + (Math.random()-0.5)*2,
        );
      }
    }

    /* ─────────────────────────────────────────────
       Interaction
    ───────────────────────────────────────────── */
    const raycaster = new THREE.Raycaster();
    const mouse     = new THREE.Vector2();
    const plane     = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    scene.add(plane);

    window.addEventListener('pointerdown', (e) => {
      initAudio();
      mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(plane);
      if (hits.length) spawnCharacter(hits[0].point);
    });

    /* ─────────────────────────────────────────────
       Animation Loop
    ───────────────────────────────────────────── */
    const clock = new THREE.Clock();
    const DT    = 1 / 60;

    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime();

      /* ── Pillar ── */
      pillarPivot.rotation.y = time * 0.85;
      pillarPivot.position.y = Math.sin(time * 1.8) * 1.8;
      const hue = 0.5 + Math.sin(time * 0.4) * 0.18;
      pillarMat.color.setHSL(hue, 1, 0.65);
      knobMat.color.setHSL(hue, 1, 0.8);

      /* ── Audio filter modulation ── */
      if (filter) {
        const ySine = Math.sin(time * 1.8);
        filter.frequency.setTargetAtTime(150 + ((ySine+1)/2)*1100, audioCtx.currentTime, 0.1);
      }

      /* ── Rings ── */
      rings.forEach((r, i) => {
        r.rotation.z = time * (0.12 + i*0.05) * (i%2 ? 1 : -1);
        r.rotation.x = Math.PI/2 + Math.sin(time*0.3 + i) * 0.2;
        r.material.opacity = 0.12 + Math.sin(time*1.2 + i*1.1)*0.08;
      });

      /* ── Sweep collision ── */
      let currentAngle = pillarPivot.rotation.y % (Math.PI*2);
      if (currentAngle < 0) currentAngle += Math.PI*2;

      characters.forEach(char => {
        if (!char.exploded) {
          const toChar = Math.atan2(char.center.z, char.center.x);
          let norm = (-toChar) % (Math.PI*2);
          if (norm < 0) norm += Math.PI*2;
          let diff = Math.abs(currentAngle - norm);
          if (diff > Math.PI) diff = Math.PI*2 - diff;
          const dist = Math.hypot(char.center.x, char.center.z);
          if (diff < 0.22 && dist < 18) explodeCharacter(char);
        } else {
          /* Physics step */
          const attr = char.mesh.geometry.attributes.position;
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const v = char.velocities[i];
            v.multiplyScalar(0.97);
            attr.array[i*3]   += v.x * DT * 60;
            attr.array[i*3+1] += v.y * DT * 60;
            attr.array[i*3+2] += v.z * DT * 60;
          }
          attr.needsUpdate = true;
          char.mesh.material.opacity -= 0.004;
          if (char.mesh.material.opacity <= 0) {
            scene.remove(char.mesh);
            char.dead = true;
          }
        }
      });

      for (let i = characters.length-1; i >= 0; i--) {
        if (characters[i].dead) characters.splice(i, 1);
      }

      composer.render();
    }

    animate();
  </script>
</body>
</html>
